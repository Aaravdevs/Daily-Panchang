<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Panchang</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9933,#ffd700);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
}

.date{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.row{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

<h1>🕉 Daily Panchang</h1>

<div class="date" id="date"></div>

<div class="row"><span class="label">Tithi:</span> Loading...</div>
<div class="row"><span class="label">Nakshatra:</span> Loading...</div>
<div class="row"><span class="label">Sunrise:</span> Loading...</div>
<div class="row"><span class="label">Sunset:</span> Loading...</div>
<div class="row"><span class="label">Festival:</span> Coming Soon</div>

<div class="footer">
Made with ❤️ by Aarav
</div>

</div>

<script>
document.getElementById("date").innerText =
new Date().toDateString();
</script>

</body>
</html>
