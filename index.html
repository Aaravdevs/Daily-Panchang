<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Panchang</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff8c00,#ffd700);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.item{
    padding:12px;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:gray;
}
</style>
</head>

<body>

<div class="card">

<h1>🕉 Daily Panchang</h1>

<div class="item">
<span class="label">Date:</span>
<span id="date"></span>
</div>

<div class="item">
<span class="label">Tithi:</span>
Ekadashi
</div>

<div class="item">
<span class="label">Nakshatra:</span>
Rohini
</div>

<div class="item">
<span class="label">Sunrise:</span>
05:30 AM
</div>

<div class="item">
<span class="label">Sunset:</span>
06:45 PM
</div>

<div class="footer">
Made with ❤️ by Aarav 
</div>

</div>

<script>
document.getElementById("date").innerText =
new Date().toDateString();
</script>

</body>
</html>
